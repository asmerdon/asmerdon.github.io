<!DOCTYPE html>
<html lang="en">
<head>
  <title>Heartbeats</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@2.8.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@0.7.0"></script>


</head>

<body>
    <div class ="container" style="width:50%;height:50%;padding:70px">
    <img src="logo.png" class="img-fluid" alt="Responsive image">
    </div>
    <br>
    <div class ="container" style="padding:20px">
      <h1 style="text-align: center;"> See the music you listened to during your best workouts.</h1>
    </div>
    <br>
    <br>

    <div class="container" style="padding:20px">           
      <button type="button" class="btn btn-danger btn-lg" id="connectStrava" onclick="stravaUserLogin()">Login to Strava</button>      
  </div>

    <div class="container" style="padding:20px">
      <h2>Enter your Last.fm username:</h2>
    </div>
    
    <div class ="container" style="padding:20px">
    <input type="text" name="lastfm_username" id="lastfm_username">
    </div>


    <div class="container" style="padding:20px">           
        <button type="button" class="btn btn-danger btn-lg" id="generateButton" onclick="getUserName()">Generate Results</button>      
    </div>

    <div class="container" id="inputError" style="display:none">
      <h3>Username not found, try again.</h3>
    </div>

    <br>
    <br>
    <div class="container">
      <div class="progress" id="progressDiv" style="display:none">
        <div class="progress-bar" id="progressbar" style="width:0%"></div>
      </div>
    </div>
    <br>

    <div class ="container" id="selectDiv" style="display:none">
      <h2>Select results from the workout with the best:
      <select id="select" onchange="select()">
        <option value="overall">Overall</option>
        <option value="bestMaxHeartrate"> Max Heartrate</option>
        <option value="bestMaxSpeed"> Max Speed</option>
        <option value="bestSufferScore"> Suffer Score</option>
        <option value="bestAverageSpeed"> Average Speed</option>
        <option value="bestAverageHeartrate"> Average Heartrate</option>
      </select>
      </h2>
    </div>

    <div class = "container" id="workoutInfo" style="display:none">
      <h2>This workout was done on <p id="date" style="display: inline; font-weight: bold;"></p> and lasted <p id="elapsed" style="display: inline;font-weight: bold;"></p>.</h2>
    </div>

    <div class = "container" id="breakdownDiv" style="display:none">
      <h2>During this workout you listened to these genres:</h2>
    </div>
    <br>
      <div class="continer" id="pieChartContent" style="position: relative;right:275px;">
        <canvas id="pieChart" style="width:50%;height:50%;">
      </div>
    
    <div class = "container" id="moreInfo" style="display:none">
      <h2 style=> Some tracks include:</h2>
      <br>
      <div class="container" id="albumContainer" style="float: left;">
        <h6 id="info0" style="display:none"><img id="image0" src="" alt="album cover 1" width="300" height="300">
          <div class="container">
            <br>
          <p id="artistname0" style="display: inline"></p> - <p id="songname0"></p></h6>
        
        <h6 id="info1" style="display:none"><img id="image1" src="" alt="album cover 2" width="300" height="300">
          <div class="container">
            <br>
          <p id="artistname1" style="display: inline"></p> - <p id="songname1"></p></h6>
          
        <h6 id="info2" style="display:none"><img id="image2" src="" alt="album cover 3" width="300" height="300">
          <div class="container">
            <br>
          <p id="artistname2" style="display: inline"></p> - <p id="songname2"></p></h6>
          </div>
      </div>
    </div>
    <div id="stravaData"></div>
    <script src=main.js></script>

</body>
</html>
